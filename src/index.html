<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Interactive Sphere - SOS Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .ui-panel {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        /* --- Info panel as collapsible drawer --- */
        #info-panel {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            max-width: 340px;
            transition: max-height 0.3s ease;
            overflow: hidden;
        }

        #info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            gap: 0.5rem;
            user-select: none;
        }

        #info-header:hover {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        #info-title {
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        #info-toggle {
            font-size: 0.65rem;
            color: #888;
            flex-shrink: 0;
        }

        #info-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
            padding: 0 0.75rem;
        }

        #info-panel.expanded #info-body {
            max-height: 60vh;
            overflow-y: auto;
            padding: 0 0.75rem 0.75rem;
        }

        #info-panel.expanded #info-toggle {
            transform: rotate(180deg);
        }

        .info-source {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0.25rem;
        }

        .info-description {
            font-size: 0.75rem;
            line-height: 1.5;
            margin-top: 0.5rem;
            color: #ddd;
        }

        .info-categories {
            font-size: 0.65rem;
            color: #999;
            margin-top: 0.5rem;
        }

        .info-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-top: 0.5rem;
        }

        .info-keyword {
            background: #0066cc;
            padding: 0.15rem 0.35rem;
            border-radius: 3px;
            font-size: 0.6rem;
        }

        .info-section-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-top: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .info-related {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .info-related li {
            margin-bottom: 0.2rem;
        }

        .info-related a, .info-catalog-link {
            color: #4da6ff;
            text-decoration: none;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .info-related a:hover, .info-catalog-link:hover {
            text-decoration: underline;
        }

        /* --- Transport controls --- */
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #0052a3;
        }

        .transport-btn {
            min-width: 24px;
            padding: 0.2rem 0.35rem;
            font-size: 0.7rem;
            line-height: 1;
        }

        #time-label {
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            #info-panel {
                max-width: calc(100vw - 1.5rem);
            }

            #info-panel.expanded #info-body {
                max-height: 40vh;
                -webkit-overflow-scrolling: touch;
                overflow-y: scroll;
            }

            .transport-btn {
                min-width: 40px;
                min-height: 40px;
                padding: 0.4rem 0.6rem;
                font-size: 1rem;
            }

            #playback-controls input[type="range"] {
                height: 28px;
            }

            #auto-rotate-btn {
                min-width: 40px;
                min-height: 40px;
            }
        }

        /* --- Loading screen --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-globe {
            position: relative;
            width: 88px;
            height: 88px;
            margin-bottom: 2rem;
        }

        .loading-globe-inner {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #1e3a6e, #08111f);
            box-shadow: 0 0 40px rgba(30, 80, 200, 0.35), inset 0 0 24px rgba(0, 10, 40, 0.9);
            position: absolute;
            top: 12px;
            left: 12px;
            animation: globe-pulse 2.4s ease-in-out infinite;
        }

        .loading-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: #4da6ff;
            border-right-color: rgba(77, 166, 255, 0.25);
            animation: ring-spin 1.6s linear infinite;
        }

        .loading-ring-2 {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 1px solid transparent;
            border-bottom-color: rgba(77, 166, 255, 0.4);
            border-left-color: rgba(77, 166, 255, 0.15);
            animation: ring-spin 2.4s linear infinite reverse;
        }

        @keyframes ring-spin {
            to { transform: rotate(360deg); }
        }

        @keyframes globe-pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(30, 80, 200, 0.35), inset 0 0 24px rgba(0, 10, 40, 0.9); }
            50% { box-shadow: 0 0 64px rgba(30, 80, 200, 0.6), inset 0 0 24px rgba(0, 10, 40, 0.9); }
        }

        .loading-title {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: #e8eaf0;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        .loading-subtitle {
            font-size: 0.65rem;
            color: #4da6ff;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        .loading-progress-track {
            width: 180px;
            height: 1.5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1px;
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .loading-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1a4a99, #4da6ff);
            border-radius: 1px;
            transition: width 0.6s ease;
            box-shadow: 0 0 8px rgba(77, 166, 255, 0.6);
        }

        #loading-status {
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 0.08em;
            min-height: 1.2em;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #cc0000;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            z-index: 100;
        }

        /* --- Browse overlay --- */
        #browse-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(13, 13, 18, 0.92);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #browse-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem 1.5rem 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        #browse-header {
            flex-shrink: 0;
            margin-bottom: 1.25rem;
        }

        .browse-title {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e8eaf0;
        }

        .browse-subtitle {
            font-size: 0.7rem;
            color: #4da6ff;
            margin-top: 0.2rem;
            opacity: 0.8;
            letter-spacing: 0.05em;
        }

        #browse-search {
            flex-shrink: 0;
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 6px;
            padding: 0.6rem 0.875rem;
            color: #fff;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            margin-bottom: 0.875rem;
            font-family: inherit;
        }

        #browse-search::placeholder {
            color: #555;
        }

        #browse-search:focus {
            border-color: rgba(77, 166, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        #browse-category-bar {
            display: flex;
            gap: 0.4rem;
            flex-wrap: nowrap;
            overflow-x: auto;
            flex-shrink: 0;
            padding-bottom: 0.75rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #browse-category-bar::-webkit-scrollbar {
            display: none;
        }

        .browse-chip {
            flex-shrink: 0;
            padding: 0.3rem 0.75rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            font-size: 0.7rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }

        .browse-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ddd;
        }

        .browse-chip.active {
            background: #0066cc;
            border-color: #0066cc;
            color: #fff;
        }

        #browse-count {
            font-size: 0.65rem;
            color: #555;
            flex-shrink: 0;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        #browse-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.75rem;
            padding-bottom: 1.5rem;
            align-content: start;
        }

        .browse-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 0.875rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        .browse-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(77, 166, 255, 0.4);
            transform: translateY(-1px);
        }

        .browse-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }

        .browse-card-title {
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.3;
            color: #e8eaf0;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .browse-card-type {
            font-size: 0.6rem;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            flex-shrink: 0;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .browse-card-type.video {
            background: rgba(77, 166, 255, 0.15);
            color: #4da6ff;
            border: 1px solid rgba(77, 166, 255, 0.3);
        }

        .browse-card-type.image {
            background: rgba(100, 200, 100, 0.12);
            color: #6dc96d;
            border: 1px solid rgba(100, 200, 100, 0.25);
        }

        .browse-card-cats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-bottom: 0.35rem;
        }

        .browse-card-cat {
            font-size: 0.6rem;
            color: #888;
            background: rgba(255, 255, 255, 0.06);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }

        .browse-card-desc {
            font-size: 0.7rem;
            color: #777;
            line-height: 1.4;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .browse-no-results {
            grid-column: 1 / -1;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            padding: 3rem 0;
        }

        @media (max-width: 768px) {
            #browse-inner {
                padding: 1rem 1rem 0;
            }

            .browse-title {
                font-size: 1.1rem;
            }

            #browse-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.5rem;
            }

            .browse-card {
                padding: 0.625rem;
            }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-globe">
            <div class="loading-globe-inner"></div>
            <div class="loading-ring"></div>
            <div class="loading-ring-2"></div>
        </div>
        <div class="loading-title">SOS Explorer</div>
        <div class="loading-subtitle">Science On a Sphere</div>
        <div class="loading-progress-track">
            <div id="loading-progress-fill" class="loading-progress-fill"></div>
        </div>
        <div id="loading-status">Initializing&hellip;</div>
    </div>
    <!-- Browse overlay — only shown when no ?dataset= URL param -->
    <div id="browse-overlay" class="hidden">
        <div id="browse-inner">
            <div id="browse-header">
                <div class="browse-title">SOS Explorer</div>
                <div class="browse-subtitle">Browse environmental datasets from NOAA Science On a Sphere</div>
            </div>
            <input type="search" id="browse-search" placeholder="Search 600+ datasets…" autocomplete="off" spellcheck="false" />
            <div id="browse-category-bar"></div>
            <div id="browse-count"></div>
            <div id="browse-grid"></div>
        </div>
    </div>

    <div id="app">
        <div id="container">
            <div id="status" class="hidden"></div>
            <div id="ui">
                <div id="time-label" class="hidden">
                    <span id="time-display">--</span>
                </div>

                <div id="latlng-display" class="hidden" style="position: absolute; top: 1rem; left: 1rem; font-size: 0.75rem; padding: 0.35rem 0.6rem; background: rgba(0, 0, 0, 0.7); border-radius: 4px; font-variant-numeric: tabular-nums; pointer-events: none;"></div>


                <div id="info-panel" class="ui-panel hidden">
                    <div id="info-header">
                        <span id="info-title"></span>
                        <span id="info-toggle">&#9660;</span>
                    </div>
                    <div id="info-body"></div>
                </div>

                <div id="playback-controls" class="ui-panel hidden" style="position: absolute; bottom: 0.75rem; right: 0.75rem; padding: 0.5rem; display: inline-flex; flex-direction: column; align-items: stretch;">
                    <div style="display: flex; gap: 0.15rem; margin-bottom: 0.3rem; justify-content: center;">
                        <button id="rewind-btn" class="transport-btn" title="Rewind to start">⏮</button>
                        <button id="step-back-btn" class="transport-btn" title="Step back one frame">⏪</button>
                        <button id="play-btn" class="transport-btn" title="Play / Pause">▶</button>
                        <button id="step-fwd-btn" class="transport-btn" title="Step forward one frame">⏩</button>
                        <button id="ff-btn" class="transport-btn" title="Fast-forward to end">⏭</button>
                        <button id="auto-rotate-btn" class="transport-btn" title="Toggle auto-rotation" style="margin-left: 0.3rem; color: #aaa; border: 1px solid #555;">&#x21BB;</button>
                    </div>
                    <input type="range" id="scrubber" min="0" max="1000" value="0" style="width: 100%; margin: 0;">
                </div>

                <button id="auto-rotate-standalone" title="Toggle auto-rotation" style="position: absolute; bottom: 0.75rem; right: 0.75rem; pointer-events: auto; min-width: 28px; padding: 0.3rem 0.5rem; font-size: 0.75rem; background: rgba(0, 0, 0, 0.7); border: 1px solid #555; border-radius: 4px; color: #aaa; cursor: pointer;">&#x21BB;</button>

                <div id="error-message" class="hidden"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>
</html>
