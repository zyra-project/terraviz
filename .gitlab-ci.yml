default:
  image: node:20-slim
  interruptible: true
  tags:
    - container
    - woc

# Cache node_modules between jobs on the same branch.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/

stages:
  - validate
  - test
  - build
  - deploy

# ---------------------------------------------------------------------------
# Validate — run fast checks first so slow jobs only run on clean code
# ---------------------------------------------------------------------------
type-check:
  stage: validate
  script:
    - npm install
    - npm run type-check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Test — unit tests with coverage report
# ---------------------------------------------------------------------------
unit-tests:
  stage: test
  script:
    - npm install
    - npm run test:coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      # Publish JUnit XML so GitLab shows per-test results in the MR
      junit: coverage/junit.xml
      # coverage_report requires cobertura format; not emitted by vitest/coverage-v8 v1.
      # Re-enable once upgraded or if cobertura reporter is confirmed working.
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Build — verify the production bundle compiles (main branch only)
# ---------------------------------------------------------------------------
build:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Deploy — push dist/ to Cloudflare Pages via wrangler CLI.
# Requires CI/CD variables: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Project name must match what was created in the Cloudflare dashboard.
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  needs: [build]
  script:
    - npx wrangler@3 pages deploy dist/
        --project-name sos-interactive-sphere
        --branch main
        --commit-hash $CI_COMMIT_SHA
  environment:
    name: production
    url: https://sos-interactive-sphere.pages.dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
