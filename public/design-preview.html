  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

[{"id":"https://unpkg.com/react@18.3.1/umd/react.production.min.js","uuid":"30304709-7dc1-425f-a08b-b0f0d23dc325"},{"id":"https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js","uuid":"6062e182-6531-496d-be2c-e03285d9d375"}]

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"387a1cd2-490b-4eee-a777-76cb1b5cf766\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   Terraviz — Color tokens\n   Source of truth: terraviz/tokens/global.json + STYLE_GUIDE.md\n   A dark, globe-first palette. Near-black page; translucent\n   white surfaces; a single sky-blue accent. Everything reads\n   on top of a 3D globe, so surfaces are alpha-on-dark, never\n   opaque fills.\n   ============================================================ */\n\n:root {\n  /* --- Brand accent (sky blue) --- */\n  --color-accent:        #4da6ff; /* links, active states, focus rings */\n  --color-accent-hover:  #6ab8ff; /* accent hover */\n  --color-accent-dark:   #0066cc; /* primary action buttons */\n  --color-accent-darker: #0052a3; /* primary button hover */\n\n  /* --- Background --- */\n  --color-bg: #0d0d12; /* page / globe letterbox */\n\n  /* --- Surfaces (translucent white on dark) --- */\n  --color-surface:               rgba(255, 255, 255, 0.06); /* panel / element bg */\n  --color-surface-alt:           rgba(255, 255, 255, 0.04); /* cards */\n  --color-surface-hover:         rgba(255, 255, 255, 0.12); /* surface hover */\n  --color-surface-active:        rgba(255, 255, 255, 0.15); /* pressed */\n  --color-surface-border:        rgba(255, 255, 255, 0.10); /* default border */\n  --color-surface-border-subtle: rgba(255, 255, 255, 0.08); /* glass-panel border */\n\n  /* --- Text (5-step dim ramp, all AA on dark glass) --- */\n  --color-text:           #e8eaf0; /* titles, headings */\n  --color-text-secondary: #bbbbbb; /* body, labels */\n  --color-text-muted:     #999999; /* metadata, timestamps (≥4.5:1) */\n  --color-text-dim:       #888888; /* counts, status (≥4.5:1) */\n  --color-text-faint:     #666666; /* decorative / disabled only — never body */\n\n  /* --- Semantic state --- */\n  --color-success:      #22c55e;\n  --color-success-soft: #6dc96d;\n  --color-error:        #ef4444;\n  --color-error-soft:   #ff6b6b;\n  --color-warning:      #ffcc66;\n\n  /* --- Facet hues (catalog grouping: chips, graph nodes, timeline) --- */\n  --facet-color-category-content:      #5cc8c8; /* teal — category & content */\n  --facet-color-format-medium:         #c486f7; /* violet — format & medium */\n  --facet-color-time:                  #f59f4a; /* amber — time ranges */\n  --facet-color-quality-availability:  #6dc96d; /* green — quality & availability */\n\n  /* --- Glass material --- */\n  --glass-bg:       rgba(13, 13, 18, 0.92); /* frosted panel — dark */\n  --glass-bg-light: rgba(13, 13, 18, 0.88); /* frosted panel — lighter */\n  --glass-blur:     blur(12px); /* @kind other */ /* backdrop-filter radius */\n\n  /* --- Accent alpha ramp (glows, focus halos, tag fills) --- */\n  --accent-o05: rgba(77, 166, 255, 0.05);\n  --accent-o08: rgba(77, 166, 255, 0.08);\n  --accent-o12: rgba(77, 166, 255, 0.12);\n  --accent-o15: rgba(77, 166, 255, 0.15);\n  --accent-o18: rgba(77, 166, 255, 0.18);\n  --accent-o20: rgba(77, 166, 255, 0.20);\n  --accent-o25: rgba(77, 166, 255, 0.25);\n  --accent-o30: rgba(77, 166, 255, 0.30);\n  --accent-o35: rgba(77, 166, 255, 0.35);\n  --accent-o40: rgba(77, 166, 255, 0.40);\n  --accent-o50: rgba(77, 166, 255, 0.50);\n  --accent-o70: rgba(77, 166, 255, 0.70);\n\n  /* --- White alpha ramp (surfaces, borders, dividers) --- */\n  --white-o05: rgba(255, 255, 255, 0.05);\n  --white-o08: rgba(255, 255, 255, 0.08);\n  --white-o10: rgba(255, 255, 255, 0.10);\n  --white-o12: rgba(255, 255, 255, 0.12);\n  --white-o15: rgba(255, 255, 255, 0.15);\n  --white-o20: rgba(255, 255, 255, 0.20);\n  --white-o30: rgba(255, 255, 255, 0.30);\n  --white-o50: rgba(255, 255, 255, 0.50);\n  --white-o70: rgba(255, 255, 255, 0.70);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Terraviz — Typography tokens\n   System font stack only — no webfonts. The globe is the hero;\n   type is quiet UI chrome that loads instantly on every device.\n   Titles are light-weight, wide-tracked, UPPERCASE. Tabular\n   numerals everywhere coordinates and time appear.\n   ============================================================ */\n\n:root {\n  /* --- Families --- */\n  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  /* --- Type scale (rem; UI runs small — globe-first) --- */\n  --text-2xs: 0.6rem;   /* keyword tags, section eyebrows */\n  --text-xs:  0.65rem;  /* metadata, counts */\n  --text-sm:  0.7rem;   /* labels, chips */\n  --text-base:0.75rem;  /* body / menu items */\n  --text-md:  0.8rem;   /* panel body, card titles */\n  --text-lg:  0.875rem; /* search input, primary buttons */\n  --text-xl:  1rem;     /* panel headings */\n  --text-2xl: 1.4rem;   /* browse / app wordmark */\n  --text-3xl: 2rem;     /* loading title */\n\n  /* --- Weights --- */\n  --weight-light:    300; /* display titles */\n  --weight-regular:  400;\n  --weight-medium:   500; /* labels, transport */\n  --weight-semibold: 600; /* card titles, section titles */\n  --weight-bold:     700;\n\n  /* --- Line heights --- */\n  --leading-tight:  1.3;\n  --leading-snug:   1.4;\n  --leading-normal: 1.55;\n\n  /* --- Letter-spacing --- */\n  --tracking-tight:  0.02em;\n  --tracking-normal: 0.03em; /* tabular data */\n  --tracking-wide:   0.05em;\n  --tracking-wider:  0.08em; /* section eyebrows */\n  --tracking-widest: 0.15em; /* uppercase display titles */\n\n  /* --- Semantic roles --- */\n  --title-display-weight: var(--weight-light);\n  --title-display-tracking: var(--tracking-widest);\n  --title-display-transform: uppercase; /* @kind other */\n  --eyebrow-weight: var(--weight-semibold);\n  --eyebrow-tracking: var(--tracking-wider);\n}\n<\u002Fstyle>\n  <style>/* ===== rotate(-24 20 20)\"><\u002Fellipse><circle cx=\"20\" cy=\"20\" r=\"6.6\" fill=\"var(--color-accent)\"><\u002Fcircle><circle cx=\"17.6\" cy=\"17.4\" r=\"2.3\" fill=\"#fff\" fill-opacity=\"0.55\"><\u002Fcircle><circle cx=\"33.2\" cy=\"13.6\" r=\"2.2\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n                  <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:.74rem;color:var(--color-text);font-weight:600\">Take the guided tour<\u002Fspan><span style=\"display:block;font-size:.64rem;color:var(--color-text-dim);margin-top:1px\">Orbit walks you through the interface<\u002Fspan><\u002Fspan>\n                  <span style=\"flex:none;color:var(--color-accent);font-size:.8rem\">▶︎<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"display:flex;flex-direction:column;gap:8px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Getting started<\u002Fdiv>\n                  <sc-for list=\"{{ helpStart }}\" as=\"h\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;gap:11px;align-items:flex-start\">\n                      <span style=\"font-size:.9rem;flex:none;width:26px;text-align:center;color:var(--color-accent)\">{{ h.icon }}<\u002Fspan>\n                      <div style=\"flex:1;min-width:0\"><div style=\"font-size:.74rem;color:var(--color-text-secondary);font-weight:600\">{{ h.title }}<\u002Fdiv><div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5;margin-top:1px\">{{ h.body }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:7px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">Keyboard shortcuts<\u002Fdiv>\n                  <sc-for list=\"{{ helpKeys }}\" as=\"k\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                      <span style=\"font-size:.68rem;color:var(--color-text-secondary)\">{{ k.label }}<\u002Fspan>\n                      <span style=\"font-family:var(--font-mono);font-size:.62rem;color:var(--color-text-muted);background:var(--white-o05);border:1px solid var(--white-o12);border-radius:4px;padding:2px 7px\">{{ k.key }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:6px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">More<\u002Fdiv>\n                  <sc-for list=\"{{ helpLinks }}\" as=\"l\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:2px 0\"><span style=\"font-size:.7rem;color:var(--color-text-secondary)\">{{ l.label }}<\u002Fspan><span style=\"font-size:.7rem;color:var(--color-accent)\">›<\u002Fspan><\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"font-size:.58rem;color:var(--color-text-faint);line-height:1.5;margin-top:4px\">Terraviz · data © NOAA Science On a Sphere. Free and open, no account required.<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ showFeedback }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ feedbackSent }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 10px;text-align:center\">\n                  <div style=\"width:44px;height:44px;border-radius:50%;background:var(--accent-o15);border:1px solid var(--accent-o40);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--color-accent)\">✓︎<\u002Fdiv>\n                  <div style=\"font-size:.82rem;color:var(--color-text);font-weight:600\">Thanks for the feedback<\u002Fdiv>\n                  <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5;max-width:13.75rem\">We read every note. It helps us decide which datasets and features to build next.<\u002Fdiv>\n                  <button sc-camel-on-click=\"{{ onFeedbackReset }}\" style=\"{{ feedbackResetStyle }}\">Send another<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ feedbackForm }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.5\">Found a bug, want a dataset, or have an idea? Tell us — it goes straight to the team.<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:6px\">\n                    <span style=\"font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-dim)\">Type<\u002Fspan>\n                    <div style=\"display:flex;gap:5px\">\n                      <sc-for list=\"{{ feedbackKinds }}\" as=\"fk\" hint-placeholder-count=\"3\">\n                        <button sc-camel-on-click=\"{{ fk.onClick }}\" style=\"{{ fk.style }}\">{{ fk.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:6px\">\n                    <span style=\"font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-dim)\">Message<\u002Fspan>\n                    <textarea value=\"{{ feedbackText }}\" sc-camel-on-input=\"{{ onFeedbackInput }}\" placeholder=\"What's on your mind?\" style=\"{{ feedbackTextareaStyle }}\"><\u002Ftextarea>\n                  <\u002Fdiv>\n                  <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer\">\n                    <button sc-camel-on-click=\"{{ onToggleAttach }}\" role=\"switch\" aria-label=\"Attach current view\" style=\"{{ attachSwitchStyle }}\"><span style=\"{{ attachKnobStyle }}\"><\u002Fspan><\u002Fbutton>\n                    <span style=\"font-size:.68rem;color:var(--color-text-secondary)\">Attach current globe view &amp; dataset<\u002Fspan>\n                  <\u002Flabel>\n                  <x-import component-from-global-scope=\"TerravizDesignSystem_fa540d.Button\" variant=\"primary\" size=\"sm\" sc-camel-on-click=\"{{ onSendFeedback }}\" hint-size=\"100%,32px\">Send feedback<\u002Fx-import>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- date/time picker (wireframe 3b) -->\n      <sc-if value=\"{{ datePickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"{{ datePickerStyle }}\">\n          <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Date &amp; time<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <button sc-camel-on-click=\"{{ onDatePrevYear }}\" aria-label=\"Previous year\" style=\"{{ dpNavStyle }}\">◀︎<\u002Fbutton>\n            <span style=\"font-family:var(--font-mono);font-size:.8rem;color:var(--color-text);letter-spacing:.03em\">{{ dateText }}<\u002Fspan>\n            <button sc-camel-on-click=\"{{ onDateNextYear }}\" aria-label=\"Next year\" style=\"{{ dpNavStyle }}\">▶︎<\u002Fbutton>\n          <\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"{{ dateMax }}\" value=\"{{ dateIdxVal }}\" sc-camel-on-input=\"{{ onDateSlider }}\" style=\"width:100%;accent-color:var(--color-accent)\">\n          <div style=\"display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.54rem;color:var(--color-text-faint)\"><span>{{ dateFirst }}<\u002Fspan><span>{{ dateLast }}<\u002Fspan><\u002Fdiv>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <div style=\"display:flex;gap:6px;align-items:center\">\n            <span style=\"font-size:.62rem;color:var(--color-text-dim);width:34px\">Date<\u002Fspan>\n            <input type=\"date\" value=\"{{ isoDateVal }}\" min=\"{{ isoMin }}\" max=\"{{ isoMax }}\" sc-camel-on-input=\"{{ onDatePick }}\" style=\"{{ dpInputStyle }}\">\n          <\u002Fdiv>\n          <sc-if value=\"{{ showTimeInput }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:6px;align-items:center\">\n              <span style=\"font-size:.62rem;color:var(--color-text-dim);width:34px\">Time<\u002Fspan>\n              <input type=\"time\" value=\"{{ isoTimeVal }}\" step=\"3600\" sc-camel-on-input=\"{{ onTimePick }}\" style=\"{{ dpInputStyle }}\">\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:5px\">\n            <button sc-camel-on-click=\"{{ onDateStart }}\" style=\"{{ dpChip }}\">Start<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onDateNow }}\" style=\"{{ dpChip }}\">Now<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onDateEnd }}\" style=\"{{ dpChip }}\">End<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- view popover -->\n      <sc-if value=\"{{ viewOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;right:12px;top:52px;width:12.5rem;padding:11px;z-index:13;display:flex;flex-direction:column;gap:9px;background:#14151c;border:1px solid var(--white-o20);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.7)\">\n          <div style=\"font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-accent)\">Layout<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:5px\">\n            <sc-for list=\"{{ stops }}\" as=\"st\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ st.onClick }}\" style=\"{{ st.chipStyle }}\">{{ st.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <div style=\"font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--color-text-dim)\">View<\u002Fdiv>\n          <sc-for list=\"{{ toggles }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.rowStyle }}\">\n              <span style=\"{{ t.boxStyle }}\">{{ t.check }}<\u002Fspan>\n              <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">{{ t.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"height:1px;background:var(--white-o08)\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onOpenSettings }}\" style=\"display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:transparent;border:none;cursor:pointer;padding:2px 0;font-family:inherit\">\n            <span style=\"font-size:.8rem;color:var(--color-text-muted)\">⚙︎<\u002Fspan>\n            <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">Settings…<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Settings dialog -->\n      <sc-if value=\"{{ settingsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div sc-camel-on-click=\"{{ onCloseSettings }}\" style=\"position:absolute;inset:0;background:rgba(0,0,0,.68);z-index:14\"><\u002Fdiv>\n        <div style=\"{{ settingsDialogStyle }}\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:13px 14px 10px;border-bottom:1px solid var(--white-o08);flex:none\">\n            <sc-if value=\"{{ settingsInSub }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ onSettingsBack }}\" aria-label=\"Back to settings\" style=\"background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:.9rem;padding:0 4px 0 0;line-height:1\">‹<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"font-weight:300;letter-spacing:.14em;font-size:.82rem;flex:1\">{{ settingsTitle }}<\u002Fdiv>\n            <x-import component-from-global-scope=\"TerravizDesignSystem_fa540d.IconButton\" variant=\"header\" label=\"Close settings\" sc-camel-on-click=\"{{ onCloseSettings }}\" hint-size=\"24px,24px\">✕︎<\u002Fx-import>\n          <\u002Fdiv>\n          <div class=\"tvx-scroll\" style=\"flex:1;min-height:0;overflow-y:auto;padding:12px 14px 16px;display:flex;flex-direction:column;gap:14px\">\n\n            <sc-if value=\"{{ settingsMain }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ settingsSections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:{{ sec.color }}\">{{ sec.title }}<\u002Fdiv>\n                <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div sc-camel-on-click=\"{{ r.onRow }}\" style=\"{{ r.rowStyle }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:1px;flex:1;min-width:0\">\n                      <span style=\"font-size:.74rem;color:var(--color-text-secondary)\">{{ r.label }}<\u002Fspan>\n                      <sc-if value=\"{{ r.hasHint }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:.58rem;color:var(--color-text-dim);line-height:1.35\">{{ r.hint }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                    <!-- toggle -->\n                    <sc-if value=\"{{ r.isToggle }}\" hint-placeholder-val=\"{{ false }}\">\n                      <button sc-camel-on-click=\"{{ r.onToggle }}\" role=\"switch\" aria-label=\"{{ r.label }}\" style=\"{{ r.switchStyle }}\"><span style=\"{{ r.knobStyle }}\"><\u002Fspan><\u002Fbutton>\n                    <\u002Fsc-if>\n                    <!-- segmented -->\n                    <sc-if value=\"{{ r.isSeg }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex;gap:3px;flex:none\">\n                        <sc-for list=\"{{ r.options }}\" as=\"op\" hint-placeholder-count=\"3\">\n                          <button sc-camel-on-click=\"{{ op.onClick }}\" style=\"{{ op.style }}\">{{ op.label }}<\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <!-- select -->\n                    <sc-if value=\"{{ r.isSelect }}\" hint-placeholder-val=\"{{ false }}\">\n                      <button sc-camel-on-click=\"{{ r.onCycle }}\" style=\"display:flex;align-items:center;gap:6px;background:var(--color-surface);border:1px solid var(--white-o12);border-radius:6px;padding:4px 9px;cursor:pointer;font-family:inherit;font-size:.7rem;color:var(--color-text-secondary);flex:none;white-space:nowrap\">{{ r.value }} <span style=\"color:var(--color-text-dim)\">▾<\u002Fspan><\u002Fbutton>\n                    <\u002Fsc-if>\n                    <!-- link -->\n                    <sc-if value=\"{{ r.isLink }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-size:.7rem;color:var(--color-accent)\">›<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ settingsPrivacy }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:.66rem;color:var(--color-text-dim);line-height:1.55;background:var(--white-o05);border:1px solid var(--white-o08);border-radius:8px;padding:9px 11px\">Terraviz is free and needs no account. Nothing here is required — these controls only make the globe remember you. Your data stays on this device unless you choose to share it.<\u002Fdiv>\n              <sc-for list=\"{{ privacySections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <div style=\"font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:{{ sec.color }}\">{{ sec.title }}<\u002Fdiv>\n                  <sc-for list=\"{{ sec.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                    <div sc-camel-on-click=\"{{ r.onRow }}\" style=\"{{ r.rowStyle }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:1px;flex:1;min-width:0\">\n                        <span style=\"font-size:.74rem;color:{{ r.labelColor }}\">{{ r.label }}<\u002Fspan>\n                        <sc-if value=\"{{ r.hasHint }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:.58rem;color:var(--color-text-dim);line-height:1.35\">{{ r.hint }}<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ r.isToggle }}\" hint-placeholder-val=\"{{ false }}\">\n                        <button sc-camel-on-click=\"{{ r.onToggle }}\" role=\"switch\" aria-label=\"{{ r.label }}\" style=\"{{ r.switchStyle }}\"><span style=\"{{ r.knobStyle }}\"><\u002Fspan><\u002Fbutton>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ r.isSelect }}\" hint-placeholder-val=\"{{ false }}\">\n                        <button sc-camel-on-click=\"{{ r.onCycle }}\" style=\"display:flex;align-items:center;gap:6px;background:var(--color-surface);border:1px solid var(--white-o12);border-radius:6px;padding:4px 9px;cursor:pointer;font-family:inherit;font-size:.7rem;color:var(--color-text-secondary);flex:none;white-space:nowrap\">{{ r.value }} <span style=\"color:var(--color-text-dim)\">▾<\u002Fspan><\u002Fbutton>\n                      <\u002Fsc-if>\n x(1.5, fWidth) + '%;border-radius:3px;background:repeating-linear-gradient(135deg,#c486f7,#c486f7 3px,rgba(196,134,247,.32) 3px,rgba(196,134,247,.32) 7px)',\n        hasDot: dotVisible,\n        dotStyle: 'position:absolute;top:50%;left:' + (nowFrac * 100) + '%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:#6dc96d;z-index:3' };\n    }).filter(Boolean);\n  }\n  tlEvents() {\n    const _f = this.state.features || {};\n    return [\n      { id: 'ev-ozone', year: 2023, kind: 'event', title: 'Record wildfire ozone, Upper Midwest', meta: 'Jun 2023 · event · Surface Ozone', ds: 'ozone',\n        date: 'June 14, 2023', place: 'Minnesota & Wisconsin, USA', stat: '128 ppb peak · +71% vs. seasonal norm',\n        lat: 45, lon: -93, bbox: [42.5, -97.2, 49.4, -86.8], source: 'MPR News', url: 'mprnews.org/story/2023/06/14/upper-midwest-ozone', datasets: ['ozone', 'fires'],\n        excerpt: 'Canadian wildfire smoke pushed ground-level ozone to the highest early-season values in the modern record across the Upper Midwest.',\n        body: ['A thick plume of boreal wildfire smoke settled over the Upper Midwest in mid-June, and sunlight cooking the trapped precursors drove ground-level ozone past 120 ppb — territory normally reached only in late-summer heat waves.', 'State agencies issued multi-day air-quality alerts for sensitive groups. The Surface Ozone reanalysis layer captures the hourly build-up and overnight flush that defined the episode.'],\n        tags: ['air quality', 'wildfire', 'public health'] },\n      { id: 'ev-ice', year: 2012, kind: 'event', title: 'Arctic sea-ice record minimum', meta: 'Sep 2012 · event · Arctic Sea Ice', ds: 'ice',\n        date: 'September 16, 2012', place: 'Arctic Ocean', stat: '3.41 M km² · lowest in the satellite era',\n        lat: 80, lon: -45, source: 'NSIDC', url: 'nsidc.org/arcticseaicenews/2012/09', datasets: ['ice', 'temp'],\n        excerpt: 'Arctic sea ice fell to its smallest extent ever measured, roughly half the 1979–2000 average minimum.',\n        body: ['On 16 September 2012 Arctic sea ice bottomed out at 3.41 million square kilometres — the lowest extent in the satellite record and about 18% below the previous 2007 record.', 'A strong August cyclone broke up already-thin ice, accelerating the melt. The Arctic Sea Ice layer shows the concentration collapse week by week.'],\n        tags: ['cryosphere', 'climate', 'record'] },\n      { id: 'bl-elnino', year: 2016, kind: 'blog', title: 'Reading an El Niño in sea-surface temps', meta: 'Feb 2016 · blog · 4 min', ds: 'sst',\n        date: 'February 3, 2016', author: 'Dr. Lena Ortiz', read: '4 min read', lat: 0, lon: -125, bbox: [-8, -170, 8, -80],\n        excerpt: 'The 2015–16 El Niño was one of the strongest on record. Here is how to spot its fingerprint in the sea-surface temperature field.',\n        body: ['El Niño announces itself as a broad tongue of warm water spreading east along the equatorial Pacific. In the 2015–16 event, anomalies topped +2.5 °C off South America for months on end.', 'Loading the Sea Surface Temperature layer and stepping through the winter makes the warm tongue — and its knock-on effects on rainfall — jump out of the noise.'],\n        tags: ['ocean', 'ENSO', 'climate'] },\n      { id: 'bl-warm', year: 2020, kind: 'blog', title: 'The hottest year on record, explained', meta: 'Jan 2021 · blog · 3 min', ds: 'temp',\n        date: 'January 12, 2021', author: 'Marcus Feld', read: '3 min read',\n        excerpt: '2020 tied 2016 as the warmest year in the instrumental record — without an El Niño to help. Here is what the anomaly map shows.',\n        body: ['2020 finished in a statistical tie with 2016 for the warmest year on record, and it did so during a La Niña that should have nudged temperatures down.', 'The Global Temperature Anomaly layer makes the pattern clear: near-uniform warmth over land, with the Arctic running far above baseline.'],\n        tags: ['climate', 'temperature', 'record'] },\n      { id: 'ev-fire', year: 2024, kind: 'event', title: 'Active fire season underway', meta: '2024 · live · Active Fires', ds: 'fires',\n        date: '2024 season · live', place: 'Western North America', stat: 'Near-real-time detections · updated hourly',\n        lat: 41, lon: -120, bbox: [32, -125, 52, -105], source: 'NASA FIRMS', url: 'firms.modaps.eosdis.nasa.gov', datasets: ['fires', 'ozone'],\n        excerpt: 'Thermal-anomaly detections are concentrated along the U.S. West and interior — a live layer that refreshes through the season.',\n        body: ['The Active Fires layer streams thermal-anomaly detections from polar-orbiting satellites, updating within a few hours of each overpass.', 'It is the near-real-time companion to the archived fire records — use it to watch this season\\u2019s activity concentrate along the western ranges.'],\n        tags: ['wildfire', 'real-time', 'land'] },\n    ].filter(e => e.kind === 'event' ? _f.events !== false : e.kind === 'blog' ? _f.blog !== false : true);\n  }\n  buildTimelineMarkers() {\n    const { tlMin, tlMax } = this.state, span = tlMax - tlMin;\n    return this.tlEvents().map(e => {\n      if (e.year < tlMin || e.year > tlMax) return null;\n      const left = ((e.year - tlMin) / span) * 100;\n      const col = e.kind === 'event' ? 'var(--facet-color-time)' : 'var(--color-accent)';\n      const sel = this.state.tlMarkerId === e.id;\n      return { title: e.title, onClick: () => this.selectMarker(e.id),\n        style: 'position:absolute;left:' + left + '%;top:9px;transform:translate(-50%,-50%);background:transparent;border:none;cursor:pointer;font-family:inherit;font-size:' + (sel ? '.8rem' : '.66rem') + ';line-height:1;color:' + col + ';padding:3px;' + (sel ? 'text-shadow:0 0 8px ' + col : '') };\n    }).filter(Boolean);\n  }\n  tlAxisTicks() {\n    const { tlMin, tlMax } = this.state;\n    return [{ year: tlMin }, { year: Math.round((tlMin + tlMax) / 2) }, { year: tlMax }];\n  }\n  buildMapStories() {\n    const s = [\n      { id: 'ozone', ev: 'ev-ozone', x: 30, y: 42, w: 18, h: 15, col: 'var(--facet-color-time)', title: 'Upper Midwest · Ozone story' },\n      { id: 'sst', ev: 'bl-elnino', x: 60, y: 60, w: 20, h: 12, col: '#5cc8c8', title: 'Eastern Pacific · Warm pool' },\n    ];\n    return s.map(m => { const on = this.state.mapStoryId === m.id; return { title: m.title, onClick: () => this.selectStory(m.id),\n      style: 'position:absolute;left:' + m.x + '%;top:' + m.y + '%;width:' + m.w + '%;height:' + m.h + '%;border:' + (on ? '2px' : '1.5px') + ' solid ' + m.col + ';background:' + (m.id === 'ozone' ? m.col : 'transparent') + ';opacity:' + (m.id === 'ozone' ? '.9' : '1') + ';border-radius:3px;cursor:pointer;box-shadow:0 0 ' + (on ? '18px' : '12px') + ' ' + m.col }; });\n  }\n  mapSel() {\n    const id = this.state.mapStoryId; if (!id) return null;\n    const mkThumb = (o) => o ? React.createElement('img', { src: this.thumb(o), alt: '', style: { width: '2.75rem', height: '2.75rem', borderRadius: '8px', flex: 'none', border: '1px solid var(--white-o08)' } }) : null;\n    const d = this.data.find(x => x.id === id);\n    if (d) { const det = this.getDetail(d); return { kind: 'dataset', title: d.title, cat: d.cat, color: d.facet, thumbImg: mkThumb(d), hasThumb: true, meta: det.temporal || '', abstract: det.abstract || '', action: 'View on globe \\u203a', onOpen: () => this.loadDataset(id) }; }\n    const e = this.mapStoryData(); if (!e) return null;\n    const ds = this.data.find(y => y.id === e.ds);\n    return { kind: e.kind, title: e.title, cat: e.kind === 'blog' ? 'Blog story' : 'Event', color: e.kind === 'blog' ? 'var(--color-accent)' : 'var(--facet-color-time)', thumbImg: mkThumb(ds), hasThumb: !!ds, meta: e.meta || '', abstract: e.excerpt || e.sub || '', action: e.kind === 'blog' ? 'Read \\u203a' : 'Open \\u203a', onOpen: () => this.openEvent(e) };\n  }\n  mapStoryData() {\n    const map = { ozone: 'ev-ozone', sst: 'bl-elnino' };\n    const evId = map[this.state.mapStoryId]; if (!evId) return null;\n    return this.tlEvents().find(e => e.id === evId) || null;\n  }\n  miniBtn(on) { return 'font-size:.68rem;padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit;border:1px solid ' + (on ? 'var(--color-accent)' : 'var(--white-o15)') + ';background:' + (on ? 'var(--accent-o15)' : 'var(--white-o05)') + ';color:' + (on ? 'var(--color-accent)' : 'var(--color-text-secondary)'); }\n  thumb(d) {\n    const f = d.facet;\n    const svg = \"<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72'>\"\n      + \"<defs><radialGradient id='g' cx='38%' cy='30%' r='78%'>\"\n      + \"<stop offset='0%' stop-color='\" + f + \"'/>\"\n      + \"<stop offset='52%' stop-color='\" + f + \"' stop-opacity='0.45'/>\"\n      + \"<stop offset='100%' stop-color='#0c2137'/><\u002FradialGradient><\u002Fdefs>\"\n      + \"<rect width='72' height='72' fill='#0a1420'/>\"\n      + \"<circle cx='36' cy='36' r='30' fill='url(#g)'/>\"\n      + \"<g stroke='rgba(255,255,255,0.16)' fill='none' stroke-width='0.7'>\"\n      + \"<ellipse cx='36' cy='36' rx='30' ry='10'/><ellipse cx='36' cy='36' rx='18' ry='30'/>\"\n      + \"<line x1='6' y1='36' x2='66' y2='36'/><\u002Fg>\"\n      + \"<circle cx='36' cy='36' r='30' fill='none' stroke='rgba(77,166,255,0.4)' stroke-width='1'/><\u002Fsvg>\";\n    return 'data:image/svg+xml,' + encodeURIComponent(svg);\n  }\n\n  stamp(idx, active) {\n    const d = this.dates[idx] || this.dates[0];\n    const cadence = active && active.cadence ? active.cadence : 'monthly';\n    if (cadence === 'monthly') return { long: d.long, short: d.short, cadence: cadence };\n    // day-of-month: user-picked if set, else deterministic from idx\n    const day = this.state.pickedDay != null ? this.state.pickedDay : ((idx * 7) % 28) + 1;\n    const mon = d.long.split(' ')[0], yr = d.long.split(' ')[1];\n    const dayStr = mon + ' ' + day + ', ' + yr;\n    if (cadence === 'daily') return { long: dayStr, short: mon + ' ' + day, cadence: cadence };\n    // hourly — append HH:MM (user-picked hour if set)\n    const hour = this.state.pickedHour != null ? this.state.pickedHour : (idx * 3) % 24;\n    const hh = String(hour).padStart(2, '0');\n    return { long: dayStr + ' · ' + hh + ':00', short: mon + ' ' + day + ' ' + hh + ':00', cadence: cadence };\n  }\n  isoDate(idx) {\n    const d = this.dates[idx] || this.dates[0];\n    const day = this.state.pickedDay != null ? this.state.pickedDay : ((idx * 7) % 28) + 1;\n    return d.y + '-' + String(d.m + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');\n  }\n  isoTime(idx) {\n    const hour = this.state.pickedHour != null ? this.state.pickedHour : (idx * 3) % 24;\n    return String(hour).padStart(2, '0') + ':00';\n  }\n\n  fmtCoord(lat, lon) {\n    const a = Math.abs(lat).toFixed(1) + '°' + (lat >= 0 ? 'N' : 'S');\n    const b = Math.abs(lon).toFixed(1) + '°' + (lon >= 0 ? 'E' : 'W');\n    return a + ' ' + b;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
