name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://terraviz.zyra-project.org/' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy
        id: deploy
        run: |
          set -o pipefail
          BRANCH_NAME="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
          # Stream wrangler output live AND capture it for preview-URL extraction.
          # The previous `DEPLOY_OUTPUT=$(wrangler ...)` pattern silently swallowed
          # wrangler errors: under `bash -e` the command substitution aborts the
          # script before the subsequent `echo "$DEPLOY_OUTPUT"` runs, so failed
          # deploys surfaced only as "Process completed with exit code 1" with no
          # visible error. Piping through `tee` fixes that — output reaches the log
          # before the step dies, and `set -o pipefail` keeps the step failing on
          # wrangler errors.
          DEPLOY_LOG=$(mktemp)
          npx wrangler@3 pages deploy dist/ --project-name terraviz --branch "$BRANCH_NAME" --commit-hash ${{ github.sha }} 2>&1 | tee "$DEPLOY_LOG"
          # Extract the preview URL from the captured log. `|| true` guards against
          # a grep no-match (which would otherwise kill the step under `bash -e`)
          # while preserving wrangler's real exit code from the pipeline above.
          PREVIEW_URL=$(grep -oP 'https://[^\s]+\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          rm -f "$DEPLOY_LOG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
