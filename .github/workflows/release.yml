name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0). Omit the "v" prefix — the workflow creates the v-prefixed tag.'
        required: true
      branch:
        description: 'Branch to release from (default: main)'
        required: false
        default: 'main'
      draft:
        description: 'Create as draft release?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # --- Bump version and create tag (manual dispatch only) ---
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Update version in package.json
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Update version in tauri.conf.json
        run: |
          jq '.version = "${{ github.event.inputs.version }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}" || echo "No changes to commit"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "${{ github.event.inputs.branch }}" --tags

  # --- Build and upload to GitHub Release ---
  build-and-release:
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag || github.ref }}
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          tagName: ${{ needs.prepare.outputs.tag || github.ref_name }}
          releaseName: 'Interactive Sphere ${{ needs.prepare.outputs.tag || github.ref_name }}'
          releaseBody: |
            See the [full changelog](https://github.com/zyra-project/interactive-sphere/commits/${{ needs.prepare.outputs.tag || github.ref_name }}).

            ## Installation
            | Platform | Download |
            |---|---|
            | Windows | `.msi` (recommended) or `.exe` (NSIS) |
            | macOS | `.dmg` |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |

            ## Auto-Updates
            Existing installations will receive this update automatically on next launch.
          releaseDraft: ${{ github.event.inputs.draft || 'true' }}
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
