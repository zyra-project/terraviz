name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0). Omit the "v" prefix — the workflow creates the v-prefixed tag.'
        required: true
      branch:
        description: 'Branch to release from (default: main)'
        required: false
        default: 'main'
      draft:
        description: 'Create as draft release?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # --- Bump version and create tag (manual dispatch only) ---
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Update version in package.json
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Update version in tauri.conf.json
        run: |
          jq '.version = "${{ github.event.inputs.version }}"' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ github.event.inputs.version }}" || echo "No changes to commit"
          git tag "v${{ github.event.inputs.version }}" 2>/dev/null || echo "Tag already exists, reusing"
          git push origin "${{ github.event.inputs.branch }}" --tags 2>/dev/null || echo "Tag already pushed"

  # --- Create the release once before the matrix dispatches ---
  # Without this, all three matrix legs run tauri-action's
  # "look up release by tag" check concurrently, all miss, and
  # each creates its own draft for the same tag — producing
  # duplicate drafts with one platform's bundles in each. This
  # job creates (or reuses, on re-run) a single release and
  # passes its id into the matrix.
  create-release:
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.resolve.outputs.release_id }}
    env:
      TAG: ${{ needs.prepare.outputs.tag || github.ref_name }}
      DRAFT: ${{ github.event.inputs.draft || 'true' }}
    steps:
      - name: Resolve or create release
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.TAG
            let release
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              })
              release = data
              core.info(`Reusing existing release ${release.id} for ${tag}`)
            } catch (e) {
              if (e.status !== 404) throw e
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Terraviz ${tag}`,
                body: `See the [full changelog](https://github.com/${context.repo.owner}/${context.repo.repo}/commits/${tag}).`,
                draft: process.env.DRAFT === 'true',
                prerelease: false,
              })
              release = data
              core.info(`Created release ${release.id} for ${tag}`)
            }
            core.setOutput('release_id', release.id)

  # --- Build and upload to GitHub Release ---
  build-and-release:
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped') && needs.create-release.result == 'success'
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag || github.ref }}
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      # Upload a version-less alias so badge download links stay stable.
      - name: Upload stable download alias
        if: runner.os == 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag || github.ref_name }}"
          # Find the MSI and upload as a stable name
          MSI=$(find src-tauri/target/release/bundle/msi -name '*.msi' | head -1)
          if [ -n "$MSI" ]; then
            cp "$MSI" "Terraviz-latest-x64.msi"
            gh release upload "$TAG" "Terraviz-latest-x64.msi" --clobber
          fi

      - name: Upload stable download alias
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag || github.ref_name }}"
          DMG=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "Terraviz-latest-aarch64.dmg"
            gh release upload "$TAG" "Terraviz-latest-aarch64.dmg" --clobber
          fi

      - name: Upload stable download alias
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag || github.ref_name }}"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "Terraviz-latest-x64.AppImage"
            gh release upload "$TAG" "Terraviz-latest-x64.AppImage" --clobber
          fi
