name: Poster

# Deploys the static poster at poster/index.html to the
# terraviz-poster Cloudflare Pages project. Mirrors the SPA's
# wrangler-based deploy in ci.yml — same auth model, same
# secrets, same shape of output. Deliberately separate from the
# SPA's CI workflow so the poster cannot delay or break SPA
# deploys (and vice versa).
#
# Triggers only on changes to poster/** or to this workflow
# file itself; SPA-only commits do not invoke this workflow.

on:
  push:
    branches: ['**']
    paths:
      - 'poster/**'
      - '.github/workflows/poster.yml'
  pull_request:
    branches: [main]
    paths:
      - 'poster/**'
      - '.github/workflows/poster.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deploy uses Cloudflare API credentials, not GITHUB_TOKEN. Default
# the GITHUB_TOKEN to read-only — addresses CodeQL "workflow does
# not contain permissions" hardening.
permissions:
  contents: read

jobs:
  drift-check:
    # Re-runs the poster build script and fails if
    # poster/index.html doesn't match what the partials
    # imply. Catches "edited a partial, forgot to re-run
    # build_poster.py" before it lands. Same shape as the
    # check:privacy-page guard the SPA already uses.
    name: Drift guard (build_poster.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Re-render poster/index.html
        run: python3 poster/scripts/build_poster.py
      - name: Fail if rendered output drifted
        run: |
          if ! git diff --exit-code -- poster/index.html; then
            echo "::error::poster/index.html is out of sync with poster/sections/."
            echo "::error::Run 'python3 poster/scripts/build_poster.py' locally and commit the result."
            exit 1
          fi
      - name: Validate source-code links
        # Catches file renames / moves before they ship as broken
        # links from the poster to GitHub. The poster intentionally
        # links filenames in §4-style cards directly to source so
        # visitors can dive into the technical details — this guard
        # keeps that promise honest as the codebase evolves.
        run: python3 poster/scripts/check_source_links.py

  deploy:
    name: Deploy poster to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [drift-check]
    # Forked-PR builds cannot read repo secrets, so wrangler
    # would fail authentication. Skip deploy on those; the
    # rendered poster is still reviewable on the diff.
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'poster-production' || 'poster-preview' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Resolve Git LFS objects so binary assets (screenshots,
          # logos, QR codes, etc.) ship as their real bytes, not as
          # 131-byte pointer files. Mirrors ci.yml's SPA deploy.
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Deploy
        id: deploy
        run: |
          set -o pipefail
          BRANCH_NAME="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
          # Stream wrangler output live AND capture it so we can
          # extract the preview URL afterwards. Same pattern as
          # ci.yml's SPA deploy — see the comments there for
          # why a naive command-substitution swallows errors.
          DEPLOY_LOG=$(mktemp)
          npx wrangler@4 pages deploy poster/ \
            --project-name terraviz-poster \
            --branch "$BRANCH_NAME" \
            --commit-hash "${{ github.sha }}" 2>&1 | tee "$DEPLOY_LOG"
          PREVIEW_URL=$(grep -oP 'https://[^\s]+\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          rm -f "$DEPLOY_LOG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
