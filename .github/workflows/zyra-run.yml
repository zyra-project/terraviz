# Phase Z1 runner (docs/ZYRA_INTEGRATION_PLAN.md §Runner). Fired by
# the publish API's `zyra-run` repository_dispatch when a workflow
# execution is queued (scheduled tick or the portal's Run now). The
# payload carries identifiers only; the fetch phase pulls the
# current pipeline definition from the API, so a stale dispatch can
# never execute a stale pipeline.
#
# Phases (cli/zyra-publish-from-dispatch.ts):
#   fetch   → pipeline.json + workflow.json + `running` callback
#   (zyra)  → the pipeline runs in the zyra-scheduler container
#   publish → SOS preflight, sidecar PATCH, asset upload, transcode
#             wait, `succeeded` callback
#   failure → `failed` callback with a sanitized summary, from the
#             if: failure() step
#
# The image is pinned by digest — the digest is the Zyra version
# pin the /validate stage allowlist is coupled to (plan doc
# §Runner); bump both together, deliberately. This digest was
# observed and validated by the Z0 spike run
# (actions/runs/27286624666: SOS-spec pass with zero warnings).
# Override per-node without a commit via the ZYRA_SCHEDULER_IMAGE
# repo variable.
#
# Required repo secrets (the transcode-hls.yml set):
#   TERRAVIZ_SERVER, CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET
name: Zyra Run

on:
  repository_dispatch:
    types: [zyra-run]

permissions:
  contents: read

# Third overlap-protection layer (behind the /due active-run skip
# and the dataset row's transcoding guard): one run per workflow id
# at a time, queued not cancelled.
concurrency:
  group: zyra-run-${{ github.event.client_payload.workflow_id }}
  cancel-in-progress: false

env:
  ZYRA_IMAGE_DEFAULT: ghcr.io/noaa-gsl/zyra-scheduler@sha256:fe83cf443dd96d3a7043e52207463424fcde11937c4b177a6fb5130d2caf9937

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Validate payload
        env:
          WORKFLOW_ID: ${{ github.event.client_payload.workflow_id }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          set -euo pipefail
          for VAR in WORKFLOW_ID RUN_ID; do
            if ! [[ "${!VAR}" =~ ^[0-9A-HJKMNP-TV-Z]{26}$ ]]; then
              echo "::error::client_payload.${VAR,,} must be a 26-char ULID; got '${!VAR}'"
              exit 1
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch workflow definition (running callback)
        env:
          TERRAVIZ_SERVER: ${{ secrets.TERRAVIZ_SERVER }}
          TERRAVIZ_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TERRAVIZ_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          npx tsx cli/zyra-publish-from-dispatch.ts \
            --phase=fetch \
            --workflow-id="${{ github.event.client_payload.workflow_id }}" \
            --run-id="${{ github.event.client_payload.run_id }}" \
            --workdir=_work \
            --gha-run-id="${{ github.run_id }}"

      # Pull this dataset's cached frames into the workdir so the
      # pipeline's `acquire --sync-dir` only fetches new frames from
      # source instead of re-downloading the whole window. Best-
      # effort: disabled (and skipped) when the R2 trio is unset, and
      # a cache miss never fails the run (see r2-frames.ts).
      - name: Restore frame cache
        env:
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CATALOG_R2_BUCKET: ${{ secrets.CATALOG_R2_BUCKET }}
        run: |
          npx tsx cli/zyra-publish-from-dispatch.ts \
            --phase=restore-frames \
            --workflow-id="${{ github.event.client_payload.workflow_id }}" \
            --run-id="${{ github.event.client_payload.run_id }}" \
            --workdir=_work

      - name: Run Zyra pipeline
        env:
          ZYRA_IMAGE: ${{ vars.ZYRA_SCHEDULER_IMAGE || '' }}
          # Verbosity for the in-container `zyra run`. Defaults to debug
          # so a failing stage (e.g. a flaky `acquire ftp` against NOAA's
          # server) surfaces its actual error instead of a bare
          # "Stage N failed with exit code 2". Quiet it later without a
          # commit via the ZYRA_VERBOSITY repo variable.
          ZYRA_VERBOSITY: ${{ vars.ZYRA_VERBOSITY || 'debug' }}
          # zyra's FTP backend has NO retry (connectors/backends/ftp.py:
          # 30s timeout, sync_directory's RETR is un-try/caught), so a
          # single transient NOAA-FTP hiccup crashes `acquire`. Retry the
          # whole `zyra run`; tune via the ZYRA_RUN_ATTEMPTS repo variable.
          ZYRA_RUN_ATTEMPTS: ${{ vars.ZYRA_RUN_ATTEMPTS || '3' }}
        run: |
          set -euo pipefail
          IMAGE="${ZYRA_IMAGE:-$ZYRA_IMAGE_DEFAULT}"
          echo "runner image: $IMAGE"
          echo "zyra verbosity: $ZYRA_VERBOSITY ; run attempts: $ZYRA_RUN_ATTEMPTS"
          docker run --rm --entrypoint "" --user 0 \
            -v "$PWD/_work:/work" \
            -e "ZYRA_VERBOSITY=$ZYRA_VERBOSITY" \
            -e "DATAVIZHUB_VERBOSITY=$ZYRA_VERBOSITY" \
            -e "ZYRA_RUN_ATTEMPTS=$ZYRA_RUN_ATTEMPTS" \
            "$IMAGE" \
            bash -c '
              set -euo pipefail
              # pad-missing needs Pillow, which the scheduler image does
              # not bundle — install it on demand (as the zyra-scheduler
              # GitLab pipeline does) when the pipeline uses that stage.
              # Pinned for reproducibility; bump deliberately alongside
              # the runner image digest.
              if grep -q "pad-missing" /work/pipeline.json && ! python -c "import PIL" >/dev/null 2>&1; then
                echo "Installing Pillow for the pad-missing stage..."
                pip install --no-cache-dir --disable-pip-version-check "pillow==12.2.0"
              fi
              # Retry the whole pipeline on failure. zyra has no internal
              # FTP retry, so a transient NOAA-FTP error crashes acquire;
              # acquire is incremental (--sync-dir + --since-period over
              # the bind-mounted /work), so each attempt resumes from the
              # frames already downloaded and only fetches what is still
              # missing. zyra stops at the first failed stage, so a retry
              # never leaves a half-run pipeline (pad-missing only runs
              # once acquire succeeds).
              attempts="${ZYRA_RUN_ATTEMPTS:-3}"
              # Guard against a bad repo-variable value (0, empty, or
              # non-integer) — otherwise seq errors under set -e or the
              # loop runs zero times and never invokes zyra.
              if ! [[ "$attempts" =~ ^[1-9][0-9]*$ ]]; then
                echo "::warning::ZYRA_RUN_ATTEMPTS=\"$attempts\" is not a positive integer; using 3"
                attempts=3
              fi
              ok=0
              for i in $(seq 1 "$attempts"); do
                echo "::group::zyra run (attempt $i/$attempts)"
                if zyra run /work/pipeline.json; then ok=1; echo "::endgroup::"; break; fi
                echo "::endgroup::"
                if [ "$i" -lt "$attempts" ]; then
                  echo "::warning::zyra run attempt $i/$attempts failed; retrying after $((i * 30))s"
                  sleep $((i * 30))
                fi
              done
              if [ "$ok" -ne 1 ]; then
                echo "::error::zyra run failed after $attempts attempt(s)"
                exit 1
              fi
            '
          # Gate on what the pipeline DECLARES, not on which files are
          # present. With the frame cache, restored frames almost always
          # exist, so a "frames exist?" check would let a video pipeline
          # whose compose-video silently failed slip through and publish
          # stale frames. Decide by whether pipeline.json writes the MP4
          # output path (mirrors WORKFLOW_OUTPUT_PATH / the validator).
          if grep -q '/work/output/dataset.mp4' _work/pipeline.json; then
            if [[ ! -f _work/output/dataset.mp4 ]]; then
              echo "::error::pipeline declares MP4 output (WORKFLOW_OUTPUT_PATH) but /work/output/dataset.mp4 was not produced"
              exit 1
            fi
            echo "pipeline produced the declared MP4"
          else
            if [[ -z "$(find _work/images/frames -maxdepth 1 -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' \) -print -quit 2>/dev/null)" ]]; then
              echo "::error::frames-output pipeline produced no frames under /work/images/frames (WORKFLOW_FRAMES_OUTPUT_DIR)"
              exit 1
            fi
            echo "pipeline produced a frame sequence — publishing via the image-sequence path"
          fi

      # Push newly-acquired frames back to the cache and prune it to
      # the active window (since-period ÷ period-seconds). Same best-
      # effort posture as restore — failing to cache never fails a
      # run that already produced a video.
      - name: Save frame cache
        env:
          R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CATALOG_R2_BUCKET: ${{ secrets.CATALOG_R2_BUCKET }}
        run: |
          npx tsx cli/zyra-publish-from-dispatch.ts \
            --phase=save-frames \
            --workflow-id="${{ github.event.client_payload.workflow_id }}" \
            --run-id="${{ github.event.client_payload.run_id }}" \
            --workdir=_work

      # ffprobe for the publish phase's SOS-spec preflight (Ubuntu
      # 22.04 ships ffmpeg 4.4 — same rationale as transcode-hls.yml).
      - name: Install ffmpeg
        # apt on GitHub runners can hang for minutes when a package
        # mirror stalls or the boot-time apt-daily / unattended-upgrades
        # job holds the dpkg lock (observed: a 10-minute stall here).
        # Stop those services, bound every network wait so a stalled
        # mirror fails fast and retries, and cap the lock wait — a
        # transient hiccup costs seconds, not the 30-minute job timeout.
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo systemctl stop apt-daily.timer apt-daily-upgrade.timer 2>/dev/null || true
          sudo systemctl stop apt-daily.service apt-daily-upgrade.service unattended-upgrades.service 2>/dev/null || true
          APT_OPTS="-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 -o DPkg::Lock::Timeout=180"
          sudo apt-get $APT_OPTS update
          sudo apt-get $APT_OPTS install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -n1

      - name: Publish to TerraViz (succeeded callback)
        env:
          TERRAVIZ_SERVER: ${{ secrets.TERRAVIZ_SERVER }}
          TERRAVIZ_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TERRAVIZ_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          npx tsx cli/zyra-publish-from-dispatch.ts \
            --phase=publish \
            --workflow-id="${{ github.event.client_payload.workflow_id }}" \
            --run-id="${{ github.event.client_payload.run_id }}" \
            --workdir=_work \
            --gha-run-id="${{ github.run_id }}"

      - name: Report failure
        if: failure()
        env:
          TERRAVIZ_SERVER: ${{ secrets.TERRAVIZ_SERVER }}
          TERRAVIZ_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TERRAVIZ_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          npx tsx cli/zyra-publish-from-dispatch.ts \
            --phase=report-failure \
            --workflow-id="${{ github.event.client_payload.workflow_id }}" \
            --run-id="${{ github.event.client_payload.run_id }}" \
            --gha-run-id="${{ github.run_id }}" \
            --error-summary="Run failed in GitHub Actions run ${{ github.run_id }} — see the Actions log."
