name: Desktop Build

# Triggers are deliberately narrow to keep Git LFS bandwidth in
# check. The 3-platform matrix below means each qualifying event
# pulls LFS three times, so we only run on main pushes and on PRs
# that target main. Feature branches still get desktop build
# feedback through their PR; they just don't get a fresh build on
# every intermediate push before the PR exists.
on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'public/**'
      # Standalone design-preview mockup is a static artifact copied
      # verbatim into the bundle — it can't affect a native build, so a
      # change to it alone should not spin up the platform matrix.
      - '!public/design-preview.html'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'public/**'
      # Standalone design-preview mockup is a static artifact copied
      # verbatim into the bundle — it can't affect a native build, so a
      # change to it alone should not spin up the platform matrix.
      - '!public/design-preview.html'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Build-only workflow — no release creation here (release.yml owns
# that). tauri-action only needs read access; GITHUB_TOKEN is passed
# for API rate-limiting, not for writes.
permissions:
  contents: read

jobs:
  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    steps:
      # PR builds below run tauri-action with `--no-bundle`, which
      # compiles Rust to verify the build but doesn't bundle static
      # assets. In that mode the LFS-tracked skybox and specular
      # textures aren't needed, so skip the LFS fetch on PR events
      # to cut bandwidth roughly in half across the 3-platform
      # matrix. Main-branch pushes still pull LFS because they
      # produce real signed bundles that ship those assets.
      - uses: actions/checkout@v4
        with:
          lfs: ${{ github.event_name != 'pull_request' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-v2-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-v2-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      # The next two `tauri-action` invocations are mutually
      # exclusive on whether the macOS Developer ID cert is in repo
      # secrets — see release.yml for the full rationale. The reason
      # for this `cert_check` indirection: GitHub Actions does NOT
      # allow the `secrets` context inside a step-level `if:`
      # expression (it surfaces as `Unrecognized named-value:
      # 'secrets'` and rejects the whole workflow file). The
      # workaround is to read the secret via `env:` (which does
      # support `secrets`), reduce it to a boolean, and emit that
      # as a step output — step outputs ARE allowed in `if:`.
      - name: Detect Developer ID cert presence
        id: cert_check
        env:
          HAS_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 != '' }}
        shell: bash
        run: echo "has_cert=$HAS_CERT" >> "$GITHUB_OUTPUT"

      # macOS + Developer ID cert in repo secrets → notarized build.
      # Tauri's bundler reads APPLE_CERTIFICATE via Rust's
      # `std::env::var_os`, which returns `Some("")` for an empty-
      # string env var — so passing `APPLE_CERTIFICATE: ''` still
      # engages `security import` and fails. The only way to get
      # the bundler to skip signing is to *not pass* the env var
      # at all, which means splitting into two mutually exclusive
      # steps rather than gating values inside one. See
      # crates/tauri-bundler/src/bundle/macos/sign.rs in the tauri
      # repo for the predicate.
      - name: Build desktop app (signed, macOS with Developer ID)
        if: github.event_name != 'pull_request' && runner.os == 'macOS' && steps.cert_check.outputs.has_cert == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Distinct from the iOS App Store *Apple Distribution* cert
          # (APPLE_CERTIFICATE_BASE64) — see release.yml for the
          # cert-type rationale. Listed verbatim here without ternary
          # gating since the step's `if:` already guarantees the cert
          # secret is non-empty.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri

      # All other main-branch builds: Linux, Windows, and macOS-
      # without-cert. No APPLE_* env vars are set at all, so
      # tauri-bundler's signing path stays dormant — same ad-hoc
      # signed build users have been running. macOS users still
      # hit the "damaged" Gatekeeper dialog until #100 lands the
      # cert; docs/MACOS_INSTALL.md walks them through the bypass.
      - name: Build desktop app (unsigned)
        if: github.event_name != 'pull_request' && !(runner.os == 'macOS' && steps.cert_check.outputs.has_cert == 'true')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri

      - name: Build desktop app (unsigned, PRs)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --no-bundle

      - name: Upload artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14
